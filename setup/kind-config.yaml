# Kind cluster configuration for the Kubernetes training
# 1 control-plane + 2 worker nodes
#
# Usage:
#   kind create cluster --config setup/kind-config.yaml --name training
#   kind delete cluster --name training

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: training
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
