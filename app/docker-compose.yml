services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENVIRONMENT: "development"
      DATABASE_URL: "postgres://postgres:training@postgres:5432/training?sslmode=disable"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: "training"
      POSTGRES_DB: "training"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
