apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-tim  # exemple : <NOM> = tim
  namespace: exercices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-tim
  template:
    metadata:
      labels:
        app: api-tim
    spec:
      # ServiceAccount pre-cree avec Workload Identity binding vers GCP
      serviceAccountName: training-apps
      containers:
        - name: api
          image: europe-west9-docker.pkg.dev/cloud-447406/training/api:v1
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: "training"
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "gcp-secrets-tim"
