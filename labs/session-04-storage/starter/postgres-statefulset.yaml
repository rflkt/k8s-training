apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: exercices
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: training
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: training-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  # TODO: add volumeClaimTemplates section
  # Create a PVC named "postgres-data" with:
  # - accessModes: ReadWriteOnce
  # - storage request: 5Gi
