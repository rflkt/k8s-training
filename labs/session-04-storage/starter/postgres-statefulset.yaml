apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-<NOM>  # Remplacez <NOM> par votre prenom
  namespace: exercices
spec:
  serviceName: postgres-<NOM>  # Doit correspondre au Service headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres-<NOM>
  template:
    metadata:
      labels:
        app: postgres-<NOM>
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: training
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: training-password
            # PGDATA pointe vers un sous-repertoire pour eviter le conflit avec lost+found
            # cree par le filesystem ext4 des Persistent Disks GKE
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  # TODO: add volumeClaimTemplates section
  # Create a PVC named "postgres-data" with:
  # - accessModes: ReadWriteOnce
  # - storage request: 5Gi
