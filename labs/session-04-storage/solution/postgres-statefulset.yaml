apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-tim  # Remplacez tim par votre prenom
  namespace: exercices
spec:
  serviceName: postgres-tim
  replicas: 1
  selector:
    matchLabels:
      app: postgres-tim
  template:
    metadata:
      labels:
        app: postgres-tim
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: training
            - name: POSTGRES_USER
              value: admin
            - name: POSTGRES_PASSWORD
              value: training-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
