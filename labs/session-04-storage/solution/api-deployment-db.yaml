apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-tim  # Remplacez tim par votre prenom
  namespace: exercices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-tim
  template:
    metadata:
      labels:
        app: api-tim
    spec:
      containers:
        - name: api
          image: europe-west9-docker.pkg.dev/cloud-447406/training/api:v1
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: training
            - name: DATABASE_URL
              value: postgres://admin:training-password@postgres-tim.exercices.svc.cluster.local:5432/training?sslmode=disable
