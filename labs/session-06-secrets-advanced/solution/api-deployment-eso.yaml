apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: exercices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: europe-west9-docker.pkg.dev/cloud-447406/training/api:v1
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: "training"
          # Secret "api-secrets" is automatically created and kept in sync by ESO
          envFrom:
            - secretRef:
                name: api-secrets
