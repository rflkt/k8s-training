# CI/CD Pipeline for the k8s-training API
#
# Builds the API image, pushes it to Google Artifact Registry, and deploys it to
# the SHARED training cluster — into YOUR trainee namespace.
#
# Auth uses Workload Identity Federation (no long-lived key). Set two repo
# secrets in your fork (GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT,
# given by the trainer — same for everyone) and your own NAMESPACE below.

name: Deploy API

# TODO: Trigger this workflow on push to the main branch
# on:
#   push:
#     branches:
#       - ???

env:
  PROJECT_ID: cloud-447406
  REGION: europe-west9
  REGISTRY: europe-west9-docker.pkg.dev/cloud-447406/training
  IMAGE_NAME: api
  GKE_CLUSTER: training-cluster
  GKE_LOCATION: europe-west9-b   # zonal cluster — NOT the region
  NAMESPACE: trainee-01          # <-- CHANGE to YOUR assigned namespace

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

