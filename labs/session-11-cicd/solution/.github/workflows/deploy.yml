# CI/CD Pipeline for the k8s-training API (Solution)
#
# Builds the API image with the multi-stage Dockerfile, pushes it to Google
# Artifact Registry, and deploys it to the SHARED training cluster — into YOUR
# trainee namespace.
#
# Auth uses Workload Identity Federation (no long-lived key). The trainer
# provisions the WIF provider + deployer SA once for the class; you only set two
# repo secrets in your fork (GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT)
# — the same values for everyone — and your own NAMESPACE below.

name: Deploy API

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: cloud-447406
  REGION: europe-west9
  REGISTRY: europe-west9-docker.pkg.dev/cloud-447406/training
  IMAGE_NAME: api
  GKE_CLUSTER: training-cluster
  GKE_LOCATION: europe-west9-b   # zonal cluster — NOT the region
  NAMESPACE: trainee-01          # <-- CHANGE to YOUR assigned namespace

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Keyless auth to GCP via Workload Identity Federation
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker to push to Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      # The shared "training" repo is used by the whole class, so the image tag
      # is prefixed with the namespace to keep each student's images separate.
      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:$NAMESPACE-${{ github.sha }} \
            -f app/api/Dockerfile.multistage \
            app/api/

      - name: Push Docker image
        run: docker push $REGISTRY/$IMAGE_NAME:$NAMESPACE-${{ github.sha }}

      # Get credentials for the shared training cluster (zonal)
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      # Deploy by updating the Deployment image — in YOUR namespace only
      - name: Deploy to GKE
        run: |
          kubectl set image deployment/api \
            api=$REGISTRY/$IMAGE_NAME:$NAMESPACE-${{ github.sha }} \
            -n $NAMESPACE

      - name: Verify deployment
        run: kubectl rollout status deployment/api -n $NAMESPACE --timeout=120s
