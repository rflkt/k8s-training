apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: exercices
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>K8s Training App</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
                background: #0d1117; color: #c9d1d9;
                min-height: 100vh; display: flex; justify-content: center;
                align-items: flex-start; padding: 40px 20px;
            }
            .container { max-width: 640px; width: 100%; }
            h1 { text-align: center; color: #58a6ff; margin-bottom: 24px; font-size: 1.8rem; }
            .card {
                background: #161b22; border: 1px solid #30363d;
                border-radius: 8px; padding: 20px; margin-bottom: 16px;
            }
            .card h2 {
                color: #58a6ff; font-size: 1rem; margin-bottom: 12px;
                border-bottom: 1px solid #30363d; padding-bottom: 8px;
            }
            .info-row {
                display: flex; justify-content: space-between;
                padding: 4px 0; font-size: 0.9rem;
            }
            .info-row .label { color: #8b949e; }
            .info-row .value { color: #c9d1d9; font-family: monospace; }
            .error { color: #f85149; font-size: 0.85rem; }
            .success { color: #3fb950; }
            .refresh-note {
                text-align: center; color: #484f58;
                font-size: 0.75rem; margin-top: 8px;
            }
            .version-badge {
                display: inline-block; background: #238636; color: #fff;
                padding: 2px 10px; border-radius: 12px; font-size: 0.85rem;
                font-weight: bold;
            }
            .hostname-highlight {
                color: #d2a8ff; font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>K8s Training App</h1>

            <div class="card">
                <h2>API Status</h2>
                <div id="api-status">Connecting...</div>
                <p class="refresh-note">Auto-refresh every 5s — watch hostname change across pods</p>
            </div>

            <div class="card">
                <h2>App Info</h2>
                <div id="app-info">Loading...</div>
            </div>

            <div class="card">
                <h2>Health Check</h2>
                <div id="health-status">Checking...</div>
            </div>
        </div>

        <script>
            const API = '/api';

            function esc(str) {
                const d = document.createElement('div');
                d.textContent = String(str);
                return d.innerHTML;
            }

            async function fetchStatus() {
                const el = document.getElementById('api-status');
                try {
                    const res = await fetch(API + '/');
                    const data = await res.json();
                    el.innerHTML =
                        '<div class="info-row"><span class="label">Message</span>' +
                        '<span class="value">' + esc(data.message || '-') + '</span></div>' +
                        '<div class="info-row"><span class="label">Hostname</span>' +
                        '<span class="value hostname-highlight">' + esc(data.hostname || '-') + '</span></div>';
                } catch (err) {
                    el.innerHTML = '<span class="error">Cannot reach API: ' + esc(err.message) + '</span>';
                }
            }

            async function fetchInfo() {
                const el = document.getElementById('app-info');
                try {
                    const res = await fetch(API + '/info');
                    const data = await res.json();
                    el.innerHTML =
                        '<div class="info-row"><span class="label">Version</span>' +
                        '<span class="version-badge">' + esc(data.version || '-') + '</span></div>' +
                        '<div class="info-row"><span class="label">Environment</span>' +
                        '<span class="value">' + esc(data.environment || '-') + '</span></div>';
                } catch (err) {
                    el.innerHTML = '<span class="error">Failed: ' + esc(err.message) + '</span>';
                }
            }

            async function fetchHealth() {
                const el = document.getElementById('health-status');
                try {
                    const res = await fetch(API + '/health');
                    const data = await res.json();
                    el.innerHTML =
                        '<div class="info-row"><span class="label">Status</span>' +
                        '<span class="value success">' + esc(data.status || 'ok') + '</span></div>';
                } catch (err) {
                    el.innerHTML = '<span class="error">Health check failed: ' + esc(err.message) + '</span>';
                }
            }

            fetchStatus(); fetchInfo(); fetchHealth();
            setInterval(function() { fetchStatus(); fetchInfo(); }, 5000);
        </script>
    </body>
    </html>
