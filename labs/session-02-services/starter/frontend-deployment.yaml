apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: exercices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # TODO: specify the image nginx:1.25-alpine
          # TODO: add container port 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: frontend-html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: nginx-config
          configMap:
            # TODO: reference the ConfigMap name "frontend-nginx-config"
            name: ""
        - name: frontend-html
          configMap:
            name: frontend-html
