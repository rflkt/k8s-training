# Helm values for Traefik installation
# Install with: helm install traefik-<NOM> traefik/traefik -n traefik-<NOM> --create-namespace -f traefik-values.yaml

api:
  dashboard: true
  insecure: true

providers:
  kubernetesCRD:
    enabled: true
    namespaces:
      - exercices
  kubernetesIngress:
    enabled: true
    namespaces:
      - exercices

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443

service:
  type: LoadBalancer

logs:
  general:
    level: INFO
  access:
    enabled: true

ingressRoute:
  dashboard:
    enabled: true
    matchRule: PathPrefix(`/dashboard`)
    entryPoints:
      - traefik
